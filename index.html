<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F1117; --surface: #161A27; --border: #1E2540;
      --text: #E8E8F0; --muted: #5A6080; --accent: #4F86C6;
      --green: #2E8B57; --red: #C05050;
      --mono: 'JetBrains Mono', monospace; --sans: 'Inter', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; min-height: 100vh; }

    /* Header */
    #header { border-bottom: 1px solid var(--border); padding: 16px 20px 0; position: sticky; top: 0; background: var(--bg); z-index: 20; }
    #header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
    #header-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    #header-title { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; color: #fff; }
    #header-meta { margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--muted); }
    #tabs { display: flex; }
    .tab-btn { background: none; border: none; cursor: pointer; padding: 8px 18px; font-size: 14px; font-family: var(--sans); color: var(--muted); border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .tab-btn.active { color: #fff; border-bottom-color: var(--accent); font-weight: 600; }

    /* Content */
    #content { max-width: 700px; margin: 0 auto; padding: 24px 16px 80px; }
    .pane { display: none; } .pane.active { display: block; }

    /* Form */
    #form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; margin-bottom: 28px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-full { margin-bottom: 16px; }
    label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; font-family: var(--mono); }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 9px 12px; font-size: 14px; font-family: var(--sans); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--accent); }
    input.error { border-color: var(--red); }
    .form-error { color: var(--red); font-size: 12px; margin-top: 4px; min-height: 16px; }

    /* Autocomplete */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #1E2540; border: 1px solid #2A3060; border-radius: 7px; z-index: 50; overflow: hidden; }
    .autocomplete-item { padding: 9px 12px; font-size: 14px; cursor: pointer; transition: background 0.1s; }
    .autocomplete-item:hover, .autocomplete-item.highlighted { background: #2A3868; }

    #btn-add { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-weight: 600; font-size: 14px; cursor: pointer; font-family: var(--sans); transition: opacity 0.15s; }
    #btn-add:hover { opacity: 0.88; }

    /* Session list */
    #session-list { display: flex; flex-direction: column; gap: 10px; }
    .session-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .session-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .session-body { flex: 1; min-width: 0; }
    .session-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .session-cat { font-weight: 600; color: #E0E0F0; }
    .session-badge { font-size: 11px; color: var(--muted); background: var(--border); border-radius: 4px; padding: 2px 7px; font-family: var(--mono); }
    .session-duration { margin-left: auto; font-weight: 700; font-family: var(--mono); font-size: 14px; }
    .session-meta { display: flex; gap: 12px; margin-top: 3px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .session-note { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 280px; }
    .btn-delete { background: none; border: none; cursor: pointer; color: #3A4060; font-size: 20px; line-height: 1; padding: 4px; flex-shrink: 0; transition: color 0.15s; }
    .btn-delete:hover { color: var(--red); }
    #empty-state { text-align: center; color: #3A4060; padding: 56px 0; font-size: 14px; line-height: 2; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    .stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
    .section-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .bar-row { margin-bottom: 14px; }
    .bar-labels { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
    .bar-key { color: #C8C8D8; }
    .bar-val { font-family: var(--mono); font-weight: 600; }
    .bar-pct { color: var(--muted); font-weight: 400; }
    .bar-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .stats-section { margin-bottom: 32px; }
    #btn-export { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 20px; font-size: 13px; cursor: pointer; font-family: var(--mono); margin-top: 8px; transition: border-color 0.15s; }
    #btn-export:hover { border-color: var(--accent); }

    /* Toast */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); color: #fff; border-radius: 8px; padding: 10px 22px; font-size: 14px; font-weight: 500; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loader */
    #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; font-family: var(--mono); color: var(--muted); font-size: 13px; z-index: 99; }

    @media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } .stat-value { font-size: 22px; } }
  </style>
</head>
<body>

<div id="loader">Connexion…</div>

<div id="header">
  <div id="header-top">
    <span id="header-eyebrow">Maxime</span>
    <span id="header-title">Tracker</span>
    <span id="header-meta"></span>
  </div>
  <div id="tabs">
    <button class="tab-btn active" data-tab="log">Saisir</button>
    <button class="tab-btn" data-tab="stats">Stats</button>
  </div>
</div>

<div id="content">
  <!-- LOG -->
  <div id="pane-log" class="pane active">
    <div id="form-card">
      <div class="form-grid">
        <div>
          <label for="f-date">Date</label>
          <input type="date" id="f-date" />
        </div>
        <div>
          <label for="f-duree">Durée</label>
          <input type="text" id="f-duree" placeholder="1h30, 45min, 2h…" />
          <div class="form-error" id="f-duree-err"></div>
        </div>
        <div>
          <label for="f-cat">Catégorie</label>
          <div class="autocomplete-wrap">
            <input type="text" id="f-cat" placeholder="Agreg, Jardin, SNT…" autocomplete="off" />
            <div class="autocomplete-list" id="ac-cat" style="display:none"></div>
          </div>
        </div>
        <div>
          <label for="f-type">Type</label>
          <div class="autocomplete-wrap">
            <input type="text" id="f-type" placeholder="Lecture, Exercice, Pratique…" autocomplete="off" />
            <div class="autocomplete-list" id="ac-type" style="display:none"></div>
          </div>
        </div>
      </div>
      <div class="form-full">
        <label for="f-note">Note (optionnel)</label>
        <input type="text" id="f-note" placeholder="Ce que j'ai fait, difficultés…" />
      </div>
      <button id="btn-add">Enregistrer</button>
    </div>
    <div id="session-list"></div>
    <div id="empty-state" style="display:none">Aucune session encore.<br>C'est le moment de commencer 🚀</div>
  </div>

  <!-- STATS -->
  <div id="pane-stats" class="pane">
    <div class="stats-grid" id="stats-cards"></div>
    <div class="stats-section"><div class="section-title">Temps par catégorie</div><div id="bars-cat"></div></div>
    <div class="stats-section"><div class="section-title">Temps par type</div><div id="bars-type"></div></div>
    <button id="btn-export">⬇ Exporter JSON (pour analyse IA)</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB57bYMj-oIUrjq6d_YqRZD_h3aOWAXisw",
    authDomain: "agenda-4e0e5.firebaseapp.com",
    projectId: "agenda-4e0e5",
    storageBucket: "agenda-4e0e5.firebasestorage.app",
    messagingSenderId: "621701400656",
    appId: "1:621701400656:web:c812f178029b59002be955"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "sessions");

  // ── Palette de couleurs auto par catégorie ────────────────────────────────
  const PALETTE = [
    "#4F86C6","#2E8B57","#C07A3A","#B05080","#6A5ACD",
    "#3A9FA0","#7A8C2A","#C05050","#5A7ABA","#A07840"
  ];
  const colorMap = {};
  let colorIdx = 0;
  function colorFor(cat) {
    if (!colorMap[cat]) { colorMap[cat] = PALETTE[colorIdx % PALETTE.length]; colorIdx++; }
    return colorMap[cat];
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function parseDuration(str) {
    if (!str) return null;
    str = str.trim().toLowerCase();
    const hm = str.match(/^(\d+)h(\d+)?$/);
    if (hm) return parseInt(hm[1]) * 60 + parseInt(hm[2] || "0");
    const m = str.match(/^(\d+)(?:min)?$/);
    if (m) return parseInt(m[1]);
    return null;
  }
  function formatMin(min) {
    if (!min && min !== 0) return "—";
    const h = Math.floor(min / 60), m = min % 60;
    if (h === 0) return `${m}min`; if (m === 0) return `${h}h`;
    return `${h}h${String(m).padStart(2,"0")}`;
  }
  function today() { return new Date().toISOString().slice(0, 10); }
  function showToast(msg, color = "#2E8B57") {
    const t = document.getElementById("toast");
    t.textContent = msg; t.style.background = color;
    t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2500);
  }

  // ── Autocomplete ──────────────────────────────────────────────────────────
  function setupAutocomplete(inputId, listId, getSuggestions) {
    const input = document.getElementById(inputId);
    const list  = document.getElementById(listId);
    let hiIdx = -1;

    function show(items) {
      if (!items.length) { list.style.display = "none"; return; }
      list.innerHTML = items.map((s,i) =>
        `<div class="autocomplete-item" data-val="${s}">${s}</div>`).join("");
      list.style.display = "block"; hiIdx = -1;
      list.querySelectorAll(".autocomplete-item").forEach(el => {
        el.addEventListener("mousedown", e => { e.preventDefault(); input.value = el.dataset.val; list.style.display = "none"; });
      });
    }

    input.addEventListener("input", () => {
      const v = input.value.trim().toLowerCase();
      const sugg = getSuggestions().filter(s => s.toLowerCase().includes(v) && s.toLowerCase() !== v);
      show(v ? sugg : []);
    });
    input.addEventListener("keydown", e => {
      const items = list.querySelectorAll(".autocomplete-item");
      if (e.key === "ArrowDown") { hiIdx = Math.min(hiIdx+1, items.length-1); items.forEach((el,i) => el.classList.toggle("highlighted", i===hiIdx)); e.preventDefault(); }
      else if (e.key === "ArrowUp") { hiIdx = Math.max(hiIdx-1, 0); items.forEach((el,i) => el.classList.toggle("highlighted", i===hiIdx)); e.preventDefault(); }
      else if (e.key === "Enter") { if (hiIdx >= 0 && items[hiIdx]) { input.value = items[hiIdx].dataset.val; list.style.display = "none"; e.preventDefault(); } }
      else if (e.key === "Escape") { list.style.display = "none"; }
    });
    document.addEventListener("click", e => { if (!input.contains(e.target) && !list.contains(e.target)) list.style.display = "none"; });
  }

  let sessions = [];
  function uniqueCats()  { return [...new Set(sessions.map(s => s.cat))].filter(Boolean); }
  function uniqueTypes() { return [...new Set(sessions.map(s => s.type))].filter(Boolean); }

  setupAutocomplete("f-cat",  "ac-cat",  uniqueCats);
  setupAutocomplete("f-type", "ac-type", uniqueTypes);

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    const total = sessions.reduce((s, x) => s + x.duree, 0);
    document.getElementById("header-meta").textContent =
      sessions.length ? `${sessions.length} session${sessions.length > 1 ? "s" : ""} · ${formatMin(total)}` : "";

    // List
    const list  = document.getElementById("session-list");
    const empty = document.getElementById("empty-state");
    list.innerHTML = "";
    if (!sessions.length) { empty.style.display = "block"; return; }
    empty.style.display = "none";
    sessions.forEach(s => {
      const color = colorFor(s.cat);
      const div = document.createElement("div");
      div.className = "session-item";
      div.innerHTML = `
        <div class="session-dot" style="background:${color}"></div>
        <div class="session-body">
          <div class="session-top">
            <span class="session-cat">${s.cat || "—"}</span>
            ${s.type ? `<span class="session-badge">${s.type}</span>` : ""}
            <span class="session-duration" style="color:${color}">${formatMin(s.duree)}</span>
          </div>
          <div class="session-meta">
            <span>${s.date}</span>
            ${s.note ? `<span class="session-note">${s.note}</span>` : ""}
          </div>
        </div>
        <button class="btn-delete" data-id="${s.id}" title="Supprimer">×</button>`;
      list.appendChild(div);
    });
    list.querySelectorAll(".btn-delete").forEach(btn =>
      btn.addEventListener("click", () =>
        deleteDoc(doc(db, "sessions", btn.dataset.id)).then(() => showToast("Supprimée", "#555"))
      )
    );

    // Stats
    if (!total) return;
    const bycat = {}, bytype = {};
    sessions.forEach(s => {
      bycat[s.cat || "—"]   = (bycat[s.cat || "—"]   || 0) + s.duree;
      bytype[s.type || "—"] = (bytype[s.type || "—"] || 0) + s.duree;
    });
    const jours = new Set(sessions.map(s => s.date)).size;
    document.getElementById("stats-cards").innerHTML = [
      ["Total", formatMin(total)],
      ["Sessions", sessions.length],
      ["Moy. / session", formatMin(Math.round(total / sessions.length))],
      ["Jours actifs", jours]
    ].map(([l,v]) => `<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value">${v}</div></div>`).join("");

    function makeBars(data, colorFn) {
      return Object.entries(data).sort((a,b) => b[1]-a[1]).map(([key,val]) => {
        const pct = total > 0 ? val/total*100 : 0;
        const c = colorFn(key);
        return `<div class="bar-row">
          <div class="bar-labels">
            <span class="bar-key">${key}</span>
            <span class="bar-val" style="color:${c}">${formatMin(val)} <span class="bar-pct">(${pct.toFixed(0)}%)</span></span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div>
        </div>`;
      }).join("");
    }
    document.getElementById("bars-cat").innerHTML  = makeBars(bycat,  colorFor);
    document.getElementById("bars-type").innerHTML = makeBars(bytype, () => "#6A5ACD");
  }

  // ── Firebase ──────────────────────────────────────────────────────────────
  onSnapshot(query(col, orderBy("date", "desc")), snap => {
    sessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
    document.getElementById("loader").style.display = "none";
  }, err => {
    document.getElementById("loader").textContent = "Erreur Firebase : " + err.message;
  });

  // ── Add ───────────────────────────────────────────────────────────────────
  document.getElementById("f-date").value = today();

  async function addSession() {
    const min = parseDuration(document.getElementById("f-duree").value);
    const errEl = document.getElementById("f-duree-err");
    const inp   = document.getElementById("f-duree");
    if (!min || min <= 0) { errEl.textContent = "Durée invalide (ex: 1h30, 45min, 2h)"; inp.classList.add("error"); return; }
    errEl.textContent = ""; inp.classList.remove("error");
    const cat  = document.getElementById("f-cat").value.trim();
    const type = document.getElementById("f-type").value.trim();
    if (!cat) { document.getElementById("f-cat").classList.add("error"); return; }
    document.getElementById("f-cat").classList.remove("error");
    await addDoc(col, {
      date:  document.getElementById("f-date").value,
      cat, type,
      duree: min,
      note:  document.getElementById("f-note").value.trim()
    });
    document.getElementById("f-duree").value = "";
    document.getElementById("f-type").value  = "";
    document.getElementById("f-note").value  = "";
    showToast("Enregistré ✓");
  }

  document.getElementById("btn-add").addEventListener("click", addSession);
  document.getElementById("f-duree").addEventListener("keydown", e => { if (e.key === "Enter") addSession(); });

  // ── Tabs ──────────────────────────────────────────────────────────────────
  document.querySelectorAll(".tab-btn").forEach(btn =>
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".pane").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("pane-" + btn.dataset.tab).classList.add("active");
      if (btn.dataset.tab === "stats") render();
    })
  );

  // ── Export ────────────────────────────────────────────────────────────────
  document.getElementById("btn-export").addEventListener("click", () => {
    const data = sessions.map(({ id, ...s }) => s);
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `tracker-${today()}.json`; a.click();
    showToast("Export téléchargé ✓");
  });
</script>
</body>
</html>
